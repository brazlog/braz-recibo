<!doctype html><html lang="pt-BR"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Busca de comprovante — Braz Log (loja)</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{ --verde:#1f9d2f; --verde-claro:#65F643; --preto:#0c0c0c; --cinza:#667; --linha:#e6e8ec; --bg:#f5f6f8; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--preto);padding-bottom:40px}
  header{background:var(--preto);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:10px}
  header .logo{font-weight:800;font-size:17px}.logo b{color:var(--verde-claro)}
  header .tag{margin-left:auto;font-size:12px;color:#9aa;letter-spacing:.06em;text-transform:uppercase}
  .wrap{max-width:560px;margin:0 auto;padding:18px}
  .card{background:#fff;border:1px solid var(--linha);border-radius:14px;padding:18px;margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:700;color:#445;margin:0 0 6px;text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;font-size:17px;padding:13px;border:1.5px solid var(--linha);border-radius:10px;background:#fbfbfc}
  input:focus{outline:none;border-color:var(--verde)}
  .row{display:flex;gap:10px;margin-top:12px}
  .btn{flex:1;font-size:16px;font-weight:700;padding:14px;border:none;border-radius:11px;background:var(--verde);color:#fff;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--preto);border:1.5px solid var(--linha)}
  .btn:active{transform:translateY(1px)}
  #scanbox{margin-top:12px;border-radius:12px;overflow:hidden;display:none}
  .msg{font-size:14px;margin-top:12px;padding:11px;border-radius:10px;display:none}
  .msg.err{display:block;background:#fdecec;border:1px solid #f3bcbc;color:#a11}
  .msg.wait{display:block;background:#eef2fb;border:1px solid #cdd9f3;color:#345}
  .res{margin-top:6px}
  .res .photo{width:100%;border-radius:12px;border:1px solid var(--linha);display:block;margin-bottom:12px;background:#000}
  .res .djp{font-family:'Courier New',monospace;font-weight:700;font-size:16px}
  .res .line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f2f5;font-size:15px}
  .res .line b{color:#445;font-weight:600}
  .badge-ok{display:inline-block;background:#eef7ef;border:1px solid #cfe9d2;color:var(--verde);font-weight:700;font-size:13px;padding:6px 12px;border-radius:999px;margin-bottom:10px}
  .hidden{display:none}
</style></head><body>
<header><span class="logo">BRAZ<b>LOG</b></span><span class="tag">Busca · Loja</span></header>
<div class="wrap">

  <!-- LOGIN -->
  <section id="login" class="card">
    <label>Senha da loja</label>
    <input id="pass" type="password" placeholder="senha" autocomplete="off">
    <div class="row"><button class="btn" id="btn-entrar">Entrar</button></div>
    <div class="msg" id="login-msg"></div>
  </section>

  <!-- BUSCA -->
  <section id="busca" class="card hidden">
    <label>Buscar pacote pelo código DJP</label>
    <input id="djp" type="text" placeholder="DJP..." autocapitalize="characters">
    <div class="row">
      <button class="btn" id="btn-buscar">Buscar</button>
      <button class="btn ghost" id="btn-scan">📷 Escanear</button>
    </div>
    <div id="scanbox"></div>
    <div class="msg" id="msg"></div>
  </section>

  <div id="resultado" class="res"></div>
</div>

<script>
const $=id=>document.getElementById(id);
let pass = localStorage.getItem("brazloja_pass") || "";
let scanner = null;

if(pass){ $("login").classList.add("hidden"); $("busca").classList.remove("hidden"); }

$("btn-entrar").addEventListener("click", ()=>{
  const v=$("pass").value.trim(); if(!v) return;
  pass=v; localStorage.setItem("brazloja_pass", v);
  $("login").classList.add("hidden"); $("busca").classList.remove("hidden");
});

$("btn-buscar").addEventListener("click", ()=> buscar($("djp").value.trim()));
$("djp").addEventListener("keydown", e=>{ if(e.key==="Enter") buscar($("djp").value.trim()); });

$("btn-scan").addEventListener("click", async ()=>{
  const box=$("scanbox");
  if(scanner){ try{await scanner.stop()}catch(e){} scanner=null; box.style.display="none"; $("btn-scan").textContent="📷 Escanear"; return; }
  box.style.display="block"; box.innerHTML='<div id="reader"></div>'; $("btn-scan").textContent="✕ Fechar câmera";
  scanner = new Html5Qrcode("reader",{verbose:false});
  try{
    await scanner.start({facingMode:"environment"}, {fps:10, qrbox:{width:260,height:160}}, async (txt)=>{
      try{await scanner.stop()}catch(e){} scanner=null; box.style.display="none"; $("btn-scan").textContent="📷 Escanear";
      $("djp").value=txt.trim(); buscar(txt.trim());
    }, ()=>{});
  }catch(e){ setMsg("err","Não consegui abrir a câmera. Digite o DJP."); box.style.display="none"; $("btn-scan").textContent="📷 Escanear"; }
});

function setMsg(kind,txt){ const m=$("msg"); m.className="msg "+kind; m.textContent=txt; }

async function buscar(djp){
  $("resultado").innerHTML="";
  if(!djp){ setMsg("err","Digite ou escaneie o código DJP."); return; }
  setMsg("wait","Buscando…");
  try{
    const r = await fetch(`/api/buscar?djp=${encodeURIComponent(djp)}&pass=${encodeURIComponent(pass)}`);
    if(r.status===401){ setMsg("err","Senha errada. Saia e entre de novo."); localStorage.removeItem("brazloja_pass"); return; }
    const d = await r.json();
    if(!d.ok){ setMsg("err","Erro na busca."); return; }
    if(!d.records.length){ setMsg("err","Nenhum registro pra "+djp+". (O cliente pode não ter usado o app.)"); return; }
    $("msg").className="msg";
    render(d.records);
  }catch(e){ setMsg("err","Falha de rede."); }
}

function render(recs){
  const out=$("resultado"); out.innerHTML="";
  recs.forEach(rec=>{
    const dt = rec.criado ? new Date(rec.criado).toLocaleString("pt-BR") : "—";
    const c=document.createElement("div"); c.className="card";
    c.innerHTML = `<div class="badge-ok">🕒 Deixado no balcão</div>
      ${rec.foto?`<img class="photo" src="${rec.foto}">`:'<div style="color:#999;font-size:14px;margin-bottom:10px">(sem foto)</div>'}
      <div class="djp">${rec.djp}</div>
      <div class="line"><b>Cliente</b><span>${rec.nome||"—"}</span></div>
      <div class="line"><b>Telefone</b><span>${rec.telefone||"—"}</span></div>
      <div class="line"><b>Deixado em</b><span>${dt}</span></div>
      <div class="line"><b>Comprovante</b><span>${rec.recibo_id||"—"}</span></div>`;
    out.appendChild(c);
  });
}
</script>
</body></html>
